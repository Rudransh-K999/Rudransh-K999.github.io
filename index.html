<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudransh | Full-Stack Developer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #020617;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-color: #0ea5e9; /* Deep Sky Blue */
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .portfolio-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        .dev-icon {
            font-size: 60px;
            color: var(--accent-color);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(14, 165, 233, 0.5));
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 20px;
            display: block;
            font-weight: 600;
        }

        .bio {
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 35px;
            font-size: 0.95rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
        }

        .btn i {
            font-size: 1.2rem;
            width: 25px;
            text-align: center;
        }

        .btn:hover {
            background: var(--accent-color);
            color: white;
            transform: scale(1.02);
            border-color: transparent;
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.4);
        }

        .footer-socials {
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .footer-socials a {
            color: var(--text-dim);
            font-size: 1.3rem;
            transition: color 0.2s;
        }

        .footer-socials a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="portfolio-card">
        <div class="dev-icon">
            <i class="fas fa-code"></i>
        </div>
        
        <h1>Rudransh</h1>
        <span class="subtitle">Software Developer</span>
        
        <p class="bio">
            Specializing in modern web applications and advanced Discord bot architecture. 
            Focused on building clean, efficient, and scalable digital solutions using Python and JS.
        </p>

        <div class="links-list">
            <a href="https://github.com/Rudransh-K999" class="btn" target="_blank">
                <i class="fab fa-github"></i>
                <span>GitHub Repositories</span>
            </a>
            <a href="#" class="btn">
                <i class="fas fa-terminal"></i>
                <span>The Ruverse Web Tools</span>
            </a>
            <a href="#" class="btn">
                <i class="fab fa-discord"></i>
                <span>Bot Portfolio</span>
            </a>
        </div>

        <div class="footer-socials">
            <a href="https://github.com/Rudransh-K999" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" title="Discord"><i class="fab fa-discord"></i></a>
            <a href="#" title="Contact"><i class="fas fa-envelope"></i></a>
        </div>
    </div>

</body>
</html>
